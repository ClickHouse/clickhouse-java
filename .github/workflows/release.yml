name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true

env:
  CH_VERSION: "25.3"

jobs:
  release:
    name: "Build and Publish Artifact"
    runs-on: "ubuntu-latest"

    permissions: write-all

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
      - name: Install JDK and Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            8
            17
          cache: 'maven'
      - name: Setup Toolchain
        shell: bash
        run: |
          mkdir -p $HOME/.m2 \
          && cat << EOF > $HOME/.m2/toolchains.xml
          <?xml version="1.0" encoding="UTF8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>17</version>
              </provides>
              <configuration>
                <jdkHome>${{ env.JAVA_HOME }}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF
      - name: Update Configuration
        run: |
          sed -i 's|<revision>.*</revision>|<revision>${{ github.event.inputs.version }}</revision>|g' pom.xml
          find . -type f -name "simplelogger.*" -exec rm -fv '{}' \;
      - name: Release Maven package
        uses: samuelmeuli/action-maven-publish@v1
        with:
          maven_profiles: release
          maven_args: -q --batch-mode -DclickhouseVersion=${{ env.CH_VERSION }}
          server_id: central
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          nexus_username: ${{ secrets.SONATYPE_TOKEN_USER }}
          nexus_password: ${{ secrets.SONATYPE_TOKEN }}
      - name: Release R2DBC 0.9.1
        uses: samuelmeuli/action-maven-publish@v1
        with:
          directory: clickhouse-r2dbc
          maven_profiles: release
          maven_args: -q --batch-mode -Dr2dbc-spi.version=0.9.1.RELEASE -DclickhouseVersion=${{ env.CH_VERSION }}
          server_id: central
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          nexus_username: ${{ secrets.SONATYPE_TOKEN_USER }}
          nexus_password: ${{ secrets.SONATYPE_TOKEN }}
      - name: Create Pre-release on Github
        uses: "zhicwu/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "v${{ github.event.inputs.version }}"
          prerelease: true
          title: "Release v${{ github.event.inputs.version }}"
          files: |
            LICENSE
            clickhouse-client/target/clickhouse*.jar
            clickhouse-data/target/clickhouse*.jar
            clickhouse-http-client/target/clickhouse*.jar
            clickhouse-jdbc/target/clickhouse*.jar
            clickhouse-jdbc/target/bundle/clickhouse*.jar
            clickhouse-r2dbc/target/clickhouse*.jar
            client-v2/target/client-v2*.jar
            jdbc-v2/target/jdbc-v2*.jar
  # Mirror Tableau TDVT after release (non-blocking).
  tdvt:
    name: "Tableau TDVT"
    needs: release
    if: ${{ needs.release.result == 'success' && startsWith(github.repository, 'ClickHouse/') }}
    runs-on: "ubuntu-latest"
    timeout-minutes: 150 # the TDVT matrix (latest/head/cloud, single-threaded) runs ~1h; allow for a queue
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
      - name: Mint a token for the TDVT repo (dispatch + read the run)
        id: tdvt-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.WORKFLOW_AUTH_PUBLIC_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTH_PUBLIC_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "clickhouse-tableau-tdvt"
      - name: Run Tableau TDVT and mirror its result
        env:
          GH_TOKEN: ${{ steps.tdvt-token.outputs.token }}
        run: |
          python3 .github/scripts/mirror_tdvt.py \
            --event-type jdbc-release \
            --version "${{ github.event.inputs.version }}" \
            --correlation-id "${{ github.repository }}#${{ github.run_id }}-${{ github.run_attempt }}"
